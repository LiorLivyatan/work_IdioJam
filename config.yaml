---
# Config
debug: False
num_samples: 5 # Works only id debug is True (min is 5)
sc_runs: 1 # Number of runs for Self-Consistency (1 means no SC)
# sc_runs: 5 # Number of runs for Self-Consistency (1 means no SC)
seed: 42
# seed: 43
# seed: 44
use_rate_limiter: False # Use rate limiter to avoid hitting the API too fast

# Directories
results_dir: experiments/results
logs_dir: experiments/logs
batched: True

# Task
task: hard_idioms # id10m, hard_idioms
lang: english # english, german

data_path: null # Set to null to use default

# Prompting config
prompt_type: zero_shot # zero_shot, few_shot_cot_best
shots: 0 # 0 or 10
temperature: 0.3 # 0.3 without SC, 0.8 with SC

# Model name
model: gpt-4o-mini
# model: gpt-4o
# model: o3-mini
# model: gemini-2.0-flash
# model: gemini-2.5-flash-lite
# model: gemini-2.5-pro
# model: meta-llama/Llama-4-Scout-17B-16E-Instruct
# model: deepseek-ai/DeepSeek-R1
# model: Qwen/Qwen2.5-72B-Instruct-Turbo
# model: claude-sonnet-4-20250514
# model: claude-3-haiku-20240307

# if not null, loads existing responses instead of running the model again
responses_dir: null
